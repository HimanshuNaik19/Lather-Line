services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: latherline_db
      POSTGRES_USER: latherline
      POSTGRES_PASSWORD: latherline_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latherline -d latherline_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: latherline_db
      DB_USER: latherline
      DB_PASSWORD: latherline_pass
      JWT_SECRET: lather-and-line-super-secret-jwt-key-change-me
    depends_on:
      postgres:
        condition: service_healthy

  # ── Optional: Redis for session/rate-limiting (commented out by default) ───
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  # redis_data:
