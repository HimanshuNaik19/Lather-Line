services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: latherline_db
      POSTGRES_USER: latherline
      POSTGRES_PASSWORD: latherline_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latherline -d latherline_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: latherline_db
      DB_USER: latherline
      DB_PASSWORD: latherline_pass
      JWT_SECRET: lather-and-line-super-secret-jwt-key-change-me
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-ac9754001@smtp-brevo.com}
      SMTP_PASS: ${SMTP_PASS:-9MOHAkmLVgwnZ47I}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_SuKl1FFWE6jEyT}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-d8ZN89H7VhEcARG4lnWLgxF1}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Optional: Redis for session/rate-limiting (commented out by default) ───
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis_data:/data

  # ── Monitoring & Analytics ──────────────────────────────────────────────────
  prometheus:
    build: ./prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
