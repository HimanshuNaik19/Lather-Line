server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:latherline_db}
    username: ${DB_USER:latherline}
    password: ${DB_PASSWORD:latherline_pass}
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true

  jpa:
    open-in-view: false       # prevent early Session opening that locks tenant context
    hibernate:
      ddl-auto: validate      # schema is managed by Flyway now
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        tenant_identifier_resolver: com.latherline.config.tenant.TenantIdentifierResolver

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ac9754001@smtp-brevo.com
    password: 9MOHAkmLVgwnZ47I
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null



app:
  jwt:
    secret: ${JWT_SECRET:lather-and-line-super-secret-jwt-key-change-in-production-32chars}
    expiration-ms: 86400000    # 24 hours
    cookie-name: ll_jwt
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}

  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_SuiK6mIIRTtdki}
    key-secret: ${RAZORPAY_KEY_SECRET:L7KV2a3x6pzJ29CJbGvFhYJV}

logging:
  level:
    com.latherline: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: lather-line
