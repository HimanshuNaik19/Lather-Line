spring:
  datasource:
    # H2 in PostgreSQL compatibility mode — no real DB needed for tests
    url: jdbc:h2:mem:latherline_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  flyway:
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        tenant_identifier_resolver: com.latherline.config.tenant.TenantIdentifierResolver

  h2:
    console:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-key-for-testing-at-least-32chars!!}
    expiration-ms: 3600000
